<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Blueprint orbit emblem for Hytale Update 5 article</title>
  <desc id="desc">A compact blue emblem with a drafting board, tool icon, and circular server orbit lines.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#70afdb" stroke-opacity=".12"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="640" rx="48" fill="#4560a9"/>
  <rect width="640" height="640" rx="48" fill="url(#grid)"/>
  <g fill="none" stroke="#70afdb" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <circle cx="320" cy="320" r="224" stroke-opacity=".55" stroke-width="8"/>
    <circle cx="320" cy="320" r="150" stroke-opacity=".35" stroke-width="5" stroke-dasharray="12 22"/>
    <path d="M114 320h412M320 114v412" stroke-opacity=".18" stroke-width="4"/>
    <path d="M224 194h166l46 252H188z" stroke-width="12"/>
    <path d="M248 236h116M240 286h156M232 336h112M224 386h148" stroke-width="8" opacity=".78"/>
    <path d="M408 202l48-48 32 34-50 48M428 238l64 72-42 38-58-78" stroke-width="10"/>
    <path d="M220 468l-42 72M418 468l48 72" stroke-width="10"/>
    <path d="M190 152c-44 32-72 82-80 136M452 488c46-34 74-86 80-144" stroke-opacity=".72" stroke-width="7"/>
    <path d="M138 284l-28 12-14-30M504 354l30-10 10 32" stroke-width="7"/>
  </g>
</svg>
